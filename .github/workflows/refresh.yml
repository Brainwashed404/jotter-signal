name: Data refresh

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:        # allow manual trigger from the Actions tab
    inputs:
      backfill_ids:
        description: "Comma-separated expert ids to deep-backfill once (e.g. benedictevans). Blank = normal incremental refresh."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The GitHub Actions cache just speeds up incremental fetches (raw_*.jsonl). It is no
      # longer load-bearing: build_dataset.py caps each source to its last 200 posts (~5k
      # signals total), so a cold cache only means a slightly thinner recent set, never a
      # rejected build. No durable-archive restore is needed — there is no deep archive to
      # preserve any more (this is a trending engine, not a deep archive).
      - name: Restore engine data from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: engine/data
          key: engine-data-healthy-${{ github.run_id }}
          restore-keys: engine-data-healthy-

      - name: Run refresh
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd engine
          if [ -n "${{ github.event.inputs.backfill_ids }}" ]; then
            echo "One-time backfill for: ${{ github.event.inputs.backfill_ids }}"
            python3 refresh_all.py --ids ${{ github.event.inputs.backfill_ids }}
          else
            python3 refresh_all.py --no-backfill
          fi

      - name: Check build health
        id: health
        run: |
          NEW=$(wc -l < web/data/signals.jsonl)
          # build_dataset.py caps every source to its last 200 posts, so a healthy build is
          # ~5k signals and is the SAME size whether or not the cache was warm. The only thing
          # left to guard against is a catastrophically broken run (fetch infra down → near-empty
          # build) clobbering good data; a floor of 1000 catches that while letting every normal
          # capped build publish. A transient thin run self-corrects on the next 4-hourly run.
          THRESH=1000
          echo "signals: new=$NEW threshold=$THRESH"
          if [ "$NEW" -ge "$THRESH" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Catastrophic build ($NEW signals < floor $THRESH) — skipping publish, keeping last good data"
          fi

      - name: Save engine data cache (healthy builds only)
        if: steps.health.outputs.ok == 'true'
        uses: actions/cache/save@v4
        with:
          path: engine/data
          key: engine-data-healthy-${{ github.run_id }}

      - name: Commit fresh data + trigger site rebuild
        if: steps.health.outputs.ok == 'true'
        run: |
          git config user.name "jotter-bot"
          git config user.email "actions@github.com"
          gzip -kf web/data/signals.jsonl
          git add -f web/data/signals.jsonl.gz web/data/experts.json web/lib/reddit-trending.json || true
          git commit --allow-empty -m "data: scheduled refresh $(date -u +%FT%TZ)"
          git push
