name: Data refresh

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:        # allow manual trigger from the Actions tab
    inputs:
      backfill_ids:
        description: "Comma-separated expert ids to deep-backfill once (e.g. benedictevans). Blank = normal incremental refresh."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore engine data from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: engine/data
          key: engine-data-healthy-${{ github.run_id }}
          restore-keys: engine-data-healthy-

      # DURABLE FALLBACK: if the GitHub Actions cache was evicted (7-day TTL, or never
      # re-saved after a run of thin builds) the archive is gone and a cold rebuild loses
      # Naughton's ~16k-post archive (26k -> ~16k thin build) ‚Äî this is what made the feed
      # go stale for days, repeatedly. publish.sh already uploads the full engine/data dir
      # as engine-data.tar.gz to object storage; this restores it so a cache miss can self-
      # heal. A capped/403 download must NOT fail the run ‚Äî the floor guard below still
      # publishes the cold build, so the feed updates regardless.
      - name: Restore engine data from object storage (fallback on cache miss)
        if: hashFiles('engine/data/posts_full.jsonl') == ''
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          echo "GitHub cache miss ‚Äî restoring durable engine-data.tar.gz from object storage‚Ä¶"
          python3 -m pip install --quiet awscli
          if aws s3 cp "s3://${R2_BUCKET}/engine-data.tar.gz" engine-data.tar.gz --endpoint-url "$R2_ENDPOINT"; then
            tar xzf engine-data.tar.gz -C engine
            echo "‚úì Restored engine archive ($(ls -1 engine/data | wc -l | tr -d ' ') files) from object storage."
          else
            echo "::warning::Object-storage restore failed (download cap / 403) ‚Äî proceeding with cold build; the floor guard will still publish it."
          fi

      - name: Run refresh
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd engine
          if [ -n "${{ github.event.inputs.backfill_ids }}" ]; then
            echo "One-time backfill for: ${{ github.event.inputs.backfill_ids }}"
            python3 refresh_all.py --ids ${{ github.event.inputs.backfill_ids }}
          else
            python3 refresh_all.py --no-backfill
          fi

      - name: Check build health
        id: health
        run: |
          NEW=$(wc -l < web/data/signals.jsonl)
          # Compare against the CURRENTLY COMMITTED build (still the old gz at this point;
          # the commit step below only regenerates it if this check passes).
          OLD=0
          if [ -f web/data/signals.jsonl.gz ]; then
            OLD=$(gzip -dc web/data/signals.jsonl.gz | wc -l)
          fi
          # Publish only if the new build exceeds the absolute floor.
          # Previously used OLD*90/100 relative guard, but that caused a permanent lockout
          # when the engine cache was lost: thin builds (~16k) failed the 90%-of-26k check,
          # so the cache was never saved, so every subsequent run was also thin. Fixed by
          # using a fixed floor only ‚Äî 15000 is still protective against a catastrophic empty
          # build while accepting the realistic cache-miss baseline of ~16k.
          THRESH=15000
          echo "signals: new=$NEW committed=$OLD threshold=$THRESH"
          if [ "$NEW" -ge "$THRESH" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Degraded build ($NEW signals < threshold $THRESH) ‚Äî skipping publish"
          fi

      - name: Save engine data cache (healthy builds only)
        if: steps.health.outputs.ok == 'true'
        uses: actions/cache/save@v4
        with:
          path: engine/data
          key: engine-data-healthy-${{ github.run_id }}

      - name: Commit fresh data + trigger site rebuild
        if: steps.health.outputs.ok == 'true'
        run: |
          git config user.name "jotter-bot"
          git config user.email "actions@github.com"
          gzip -kf web/data/signals.jsonl
          git add -f web/data/signals.jsonl.gz web/data/experts.json web/lib/reddit-trending.json || true
          git commit --allow-empty -m "data: scheduled refresh $(date -u +%FT%TZ)"
          git push
