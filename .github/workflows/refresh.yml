name: Data refresh

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:        # allow manual trigger from the Actions tab
    inputs:
      backfill_ids:
        description: "Comma-separated expert ids to deep-backfill once (e.g. benedictevans). Blank = normal incremental refresh."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore engine data from cache
        uses: actions/cache@v4
        with:
          path: engine/data
          key: engine-data-${{ github.run_id }}
          restore-keys: engine-data-

      - name: Run refresh
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd engine
          if [ -n "${{ github.event.inputs.backfill_ids }}" ]; then
            echo "One-time backfill for: ${{ github.event.inputs.backfill_ids }}"
            python3 refresh_all.py --ids ${{ github.event.inputs.backfill_ids }}
          else
            python3 refresh_all.py --no-backfill
          fi

      - name: Check build health
        id: health
        run: |
          NEW=$(wc -l < web/data/signals.jsonl)
          # Compare against the CURRENTLY COMMITTED build (still the old gz at this point;
          # the commit step below only regenerates it if this check passes).
          OLD=0
          if [ -f web/data/signals.jsonl.gz ]; then
            OLD=$(gzip -dc web/data/signals.jsonl.gz | wc -l)
          fi
          # Publish only if the new build is at least 90% of the committed one, with an
          # absolute floor of 3000 for the first-ever build. A capped run that yields a
          # thin (e.g. 16k vs 26k) rebuild is rejected so it can't clobber good live data.
          THRESH=$(( OLD * 90 / 100 ))
          if [ "$THRESH" -lt 3000 ]; then THRESH=3000; fi
          echo "signals: new=$NEW committed=$OLD threshold=$THRESH"
          if [ "$NEW" -ge "$THRESH" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Degraded build ($NEW signals < threshold $THRESH, 90% of committed $OLD) — skipping publish"
          fi

      - name: Commit fresh data + trigger site rebuild
        if: steps.health.outputs.ok == 'true'
        run: |
          git config user.name "jotter-bot"
          git config user.email "actions@github.com"
          gzip -kf web/data/signals.jsonl
          git add -f web/data/signals.jsonl.gz web/data/experts.json web/lib/reddit-trending.json || true
          git commit --allow-empty -m "data: scheduled refresh $(date -u +%FT%TZ)"
          git push
